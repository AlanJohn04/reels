services:
  - type: web
    name: reels-labs
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: YOUTUBE_TOKEN_JSON
        sync: false # User must provide this in Render dashboard
      - key: YOUTUBE_CLIENT_SECRETS_JSON
        sync: false
    # Use a bigger instance if possible for rendering
    plan: free # Change to starter/pro if rendering is too slow
    healthCheckPath: /
