<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REELS LABS — Manhwa AI Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff0055;
            --accent-glow: rgba(255, 0, 85, 0.4);
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* ── Dynamic Background ── */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 0, 85, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 100, 255, 0.05) 0%, transparent 40%);
        }

        /* ── Container ── */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            color: var(--text);
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ── Form ── */
        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-left: 4px;
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        textarea {
            resize: vertical;
            min-height: 200px;
            line-height: 1.6;
        }

        /* ── Buttons ── */
        .btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px var(--accent-glow);
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn.loading {
            background: #444;
            pointer-events: none;
            box-shadow: none;
        }

        /* ── Status ── */
        #status-area {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--border);
            display: none;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.8); opacity: 0.3; }
            100% { transform: scale(1); opacity: 1; }
        }

        #log-output {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #a8bcd4;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* ── Footer ── */
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn.loading .loader {
            display: block;
        }
        .btn.loading .btn-text {
            display: none;
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <div class="container">
        <header>
            <h1>REELS LABS</h1>
            <div class="subtitle">AI Production Engine • Autonomous Publishing</div>
        </header>

        <form id="reels-form">
            <div class="form-grid">
                <div class="input-group">
                    <label for="series">Series Name</label>
                    <input type="text" id="series" name="series" placeholder="e.g. Omniscient Reader" required>
                </div>
                <div class="input-group">
                    <label for="chapter">Chapter</label>
                    <input type="number" id="chapter" name="chapter" placeholder="1" required>
                </div>
            </div>

            <div class="input-group">
                <label for="script">Narration Script</label>
                <textarea id="script" name="script" placeholder="Enter the story script for AI narration..." required></textarea>
            </div>

            <button type="submit" class="btn" id="submit-btn" style="position: relative;">
                <span class="loader" id="loader"></span>
                <span class="btn-text" id="btn-text">MAKE & PUBLISH</span>
            </button>
        </form>

        <div id="status-area">
            <div class="status-header">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="status-dot"></div>
                    <span style="font-size: 0.75rem; font-weight: 600; color: var(--accent);">PROCESSING ENGINE ACTIVE</span>
                </div>
                <span id="elapsed-time" style="font-size: 0.7rem; color: var(--text-dim);">00:00</span>
            </div>
            <div id="log-output">Initializing subroutines...</div>
        </div>

        <footer>
            System v5.0 • Highly Optimized for Shorts
        </footer>
    </div>

    <script>
        const form = document.getElementById('reels-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusArea = document.getElementById('status-area');
        const logOutput = document.getElementById('log-output');
        const elapsedTime = document.getElementById('elapsed-time');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');

        let timer;
        let seconds = 0;

        function startTimer() {
            seconds = 0;
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                seconds++;
                const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
                const secs = String(seconds % 60).padStart(2, '0');
                elapsedTime.textContent = `${mins}:${secs}`;
            }, 1000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                series: document.getElementById('series').value,
                chapter: document.getElementById('chapter').value,
                script: document.getElementById('script').value
            };

            submitBtn.disabled = true;
            loader.style.display = 'block';
            btnText.style.display = 'none';
            statusArea.style.display = 'block';
            logOutput.textContent = "> Job queued in production pipeline...\n";
            startTimer();

            try {
                const response = await fetch('/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                
                if (data.status === 'started') {
                    logOutput.textContent += "> Sync established. Rendering engine engaged.\n";
                    logOutput.textContent += `> Task ID: ${data.task_id}\n`;
                    pollStatus(data.task_id);
                } else {
                    logOutput.textContent += `> Error: ${data.message}\n`;
                    submitBtn.disabled = false;
                    loader.style.display = 'none';
                    btnText.style.display = 'block';
                    clearInterval(timer);
                }
            } catch (err) {
                logOutput.textContent += `> Network Exception: ${err.message}\n`;
                submitBtn.disabled = false;
                loader.style.display = 'none';
                btnText.style.display = 'block';
                clearInterval(timer);
            }
        });

        async function pollStatus(taskId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${taskId}`);
                    const data = await res.json();
                    
                    if (data.logs) {
                        logOutput.textContent = data.logs;
                        logOutput.scrollTop = logOutput.scrollHeight;
                    }

                    if (data.status === 'completed') {
                        clearInterval(interval);
                        clearInterval(timer);
                        logOutput.textContent += "\n> MISSION ACCOMPLISHED. Video live on YouTube.";
                        submitBtn.disabled = false;
                        loader.style.display = 'none';
                        btnText.style.display = 'block';
                    } else if (data.status === 'failed') {
                        clearInterval(interval);
                        clearInterval(timer);
                        logOutput.textContent += "\n> CRITICAL FAILURE: Engine stalled.";
                        submitBtn.disabled = false;
                        loader.style.display = 'none';
                        btnText.style.display = 'block';
                    }
                } catch (err) {
                    console.error("Polling failed", err);
                }
            }, 3000);
        }
    </script>
</body>
</html>
